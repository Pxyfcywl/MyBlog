services:
  backend:
    build: ./backend
    container_name: myblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/blog.db:/app/blog.db
      - ./backend/uploads:/app/uploads
      - ./backend/music:/app/music
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./blog.db

  frontend:
    build: ./frontend
    container_name: myblog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
